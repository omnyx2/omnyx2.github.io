---
layout: project_page
title: Projects
permalink: /projects/
---
<div class="empty_container"></div>
<div class="project_supercontainer">
  <div class="project_gallery">
    {% for project in site.projects %}
    <a href="{{ project.url }}">
      <div class="project_container">

          <div class="project_first_comment">
              <h5 class="project_team_num">{{project.project_team_num}}
                  <i class="fas fa-user"></i>
              </h5>
            <h6 class="project_date">{{project.project_date}}</h6>
            <h4 class="project_title">{{ project.project_file_name }}</h4>
          </div>

          <div class="project_image_container"><img src="{{ project.main_image_path }}" alt="{{project.title}}"/></div>

          <div class="project_second_comment">
              <h5 class="project_team_num">{{project.project_team_num}}
                  <i class="fas fa-user"></i>
              </h5>
              <h6 class="project_date">{{project.project_date}}</h6>
              <h4 class="project_title">{{ project.project_file_name }}</h4>
          </div>
      </div>
    </a>
    {% endfor %}
  </div>
</div>
